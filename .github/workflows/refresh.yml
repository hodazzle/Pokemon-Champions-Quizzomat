name: Refresh & Deploy

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch: {} # lets you run it on demand from the Actions tab
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Run the bundled JS actions on Node 24 (Node 20 runtime is removed after Sep 2026,
# and forced off by default from Jun 2026). Keeps the weekly build working unattended.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Scrape latest Pikalytics data
        run: node scripts/scrape.mjs

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
