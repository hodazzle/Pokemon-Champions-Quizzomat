<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1220" />
    <title>Champions Quiz</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Champions" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Top bar -->
      <header class="topbar">
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        <div class="topbar-stats">
          <span id="stat-due" class="pill pill-due" title="Cards due now">0 due</span>
          <span id="stat-done" class="pill" title="Reviewed today">0 today</span>
        </div>
        <button id="btn-stats" class="icon-btn" title="Progress" aria-label="Progress">📊</button>
      </header>

      <!-- Main quiz card -->
      <main id="quiz" class="quiz" hidden>
        <div class="card">
          <div class="card-head">
            <span id="q-category" class="category-badge">Moves</span>
            <span id="q-usage" class="usage-tag"></span>
          </div>

          <img id="q-sprite" class="sprite" alt="" />
          <h1 id="q-name" class="poke-name">—</h1>
          <div id="q-types" class="type-row"></div>
          <p id="q-prompt" class="prompt">…</p>

          <!-- Answer (hidden until flip) -->
          <div id="answer" class="answer" hidden></div>

          <!-- Controls -->
          <div class="controls">
            <button id="btn-flip" class="btn btn-primary">Show answer</button>
            <div id="grade-row" class="grade-row" hidden>
              <button class="btn grade" data-grade="again">Again</button>
              <button class="btn grade" data-grade="good">Good</button>
              <button class="btn grade" data-grade="easy">Easy</button>
            </div>
          </div>
        </div>
        <p class="hint">Tap the card or press <kbd>Space</kbd> to flip · grade with <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd></p>
      </main>

      <!-- Empty / loading states -->
      <section id="message" class="message">
        <p id="message-text">Loading the latest Champions data…</p>
        <button id="message-action" class="btn btn-primary" hidden></button>
      </section>
    </div>

    <!-- Settings drawer -->
    <div id="settings" class="drawer" hidden>
      <div class="drawer-inner">
        <div class="drawer-head">
          <h2>Settings</h2>
          <button id="settings-close" class="icon-btn" aria-label="Close">✕</button>
        </div>

        <h3>Quiz types</h3>
        <div id="cat-toggles" class="toggles"></div>

        <h3>Scope</h3>
        <label class="field">
          Quiz only the top
          <input id="top-n" type="number" min="10" max="200" step="10" />
          most-used Pokémon
        </label>
        <label class="field">
          New cards introduced per day
          <input id="new-per-day" type="number" min="0" max="100" step="5" />
        </label>

        <h3>Data</h3>
        <p id="data-info" class="muted small"></p>

        <h3 class="danger-h">Danger zone</h3>
        <button id="btn-reset" class="btn btn-danger">Reset all my progress</button>
      </div>
    </div>

    <!-- Stats drawer -->
    <div id="stats" class="drawer" hidden>
      <div class="drawer-inner">
        <div class="drawer-head">
          <h2>Progress</h2>
          <button id="stats-close" class="icon-btn" aria-label="Close">✕</button>
        </div>
        <div id="stats-body" class="stats-body"></div>
      </div>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
